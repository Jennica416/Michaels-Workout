<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Michael's Workout</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#085041;--green-mid:#0F6E56;
    --blue:#378ADD;--blue-light:#E6F1FB;--blue-dark:#0C447C;
    --amber:#BA7517;--amber-light:#FAEEDA;--amber-dark:#412402;
    --purple:#7F77DD;--purple-light:#EEEDFE;--purple-dark:#26215C;
    --coral:#D85A30;--coral-light:#FAECE7;--coral-dark:#4A1B0C;
    --gray:#888780;--gray-light:#F1EFE8;--gray-mid:#B4B2A9;--gray-dark:#2C2C2A;
    --red:#E24B4A;--red-light:#FCEBEB;
    --text:#1a1a18;--text-muted:#5F5E5A;--text-hint:#888780;
    --bg:#fafaf8;--surface:#ffffff;--border:rgba(0,0,0,0.10);--border-mid:rgba(0,0,0,0.18);
    --radius:12px;--radius-sm:8px;
    --shadow:0 2px 12px rgba(0,0,0,0.07);--shadow-md:0 4px 24px rgba(0,0,0,0.10);
  }
  @media(prefers-color-scheme:dark){
    :root{
      --text:#f0f0ec;--text-muted:#B4B2A9;--text-hint:#888780;
      --bg:#181816;--surface:#222220;--border:rgba(255,255,255,0.10);--border-mid:rgba(255,255,255,0.18);
      --gray-light:#2C2C2A;--green-light:#04342C;--blue-light:#042C53;--purple-light:#26215C;--amber-light:#412402;--coral-light:#4A1B0C;
    }
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* AUTH */
  #auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:var(--bg);}
  .auth-card{background:var(--surface);border-radius:20px;padding:2.5rem 2rem;max-width:420px;width:100%;text-align:center;box-shadow:var(--shadow-md);border:1px solid var(--border);}
  .auth-logo{font-size:3rem;margin-bottom:0.5rem;}
  .auth-title{font-family:'DM Serif Display',serif;font-size:2rem;font-weight:400;margin-bottom:0.25rem;color:var(--text);}
  .auth-name{color:var(--green);}
  .auth-sub{font-size:14px;color:var(--text-muted);margin-bottom:2rem;line-height:1.6;}
  .auth-phases{display:flex;gap:0.5rem;justify-content:center;margin-bottom:2rem;}
  .auth-phase{background:var(--gray-light);border-radius:8px;padding:0.5rem 0.75rem;font-size:12px;font-weight:600;color:var(--text-muted);}
  .auth-phase.p1{background:var(--green-light);color:var(--green-mid);}
  .auth-phase.p2{background:var(--blue-light);color:var(--blue-dark);}
  .sign-in-btn{display:flex;align-items:center;justify-content:center;gap:0.75rem;width:100%;padding:0.875rem;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;}
  .sign-in-btn:hover{background:var(--green-mid);}

  /* LOADING */
  #loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:999;align-items:center;justify-content:center;}
  .loading-card{background:var(--surface);border-radius:var(--radius);padding:2rem;text-align:center;min-width:260px;box-shadow:var(--shadow-md);}
  .spinner{width:40px;height:40px;border:3px solid var(--border-mid);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #loading-msg{font-size:14px;color:var(--text-muted);}

  /* SYNC BAR */
  #sync-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--green);color:#fff;text-align:center;font-size:13px;font-weight:500;padding:6px;transform:translateY(-100%);transition:transform 0.3s;}
  #sync-bar.visible{transform:translateY(0);}
  #sync-bar.error{background:var(--red);}
  #sync-bar.saving{background:var(--amber);}

  /* APP */
  #app{display:none;min-height:100vh;}
  .app-header{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;padding:0.75rem 1.25rem;}
  .header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:1rem;}
  .header-logo{font-family:'DM Serif Display',serif;font-size:1.35rem;font-weight:400;flex:1;color:var(--text);}
  .header-logo span{color:var(--green);}
  .header-greeting{font-size:12px;color:var(--text-hint);margin-left:4px;}
  .header-stats{display:flex;gap:0.75rem;align-items:center;}
  .stat-pill{background:var(--gray-light);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;color:var(--text-muted);}
  .stat-pill strong{color:var(--green);font-weight:600;}
  .user-avatar{width:32px;height:32px;border-radius:50%;background:var(--green);color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
  .progress-bar-wrap{height:3px;background:var(--border);margin-top:0.5rem;max-width:960px;margin-left:auto;margin-right:auto;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));transition:width 0.6s;}

  /* LAYOUT */
  .main-layout{max-width:960px;margin:0 auto;padding:1.25rem;display:grid;grid-template-columns:200px 1fr;gap:1.25rem;}
  @media(max-width:660px){.main-layout{grid-template-columns:1fr;}}

  /* SIDEBAR */
  .phase-tabs{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1rem;}
  .phase-btn{padding:0.65rem 1rem;border:1.5px solid var(--border-mid);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text-muted);text-align:left;transition:all 0.2s;line-height:1.3;}
  .phase-btn small{display:block;font-size:10px;font-weight:400;margin-top:1px;opacity:0.8;}
  .phase-btn.active.p1{border-color:var(--green);color:var(--green-mid);background:var(--green-light);font-weight:600;}
  .phase-btn.active.p2{border-color:var(--blue);color:var(--blue-dark);background:var(--blue-light);font-weight:600;}
  .sidebar-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-hint);margin-bottom:0.5rem;padding:0 0.25rem;}
  #week-list{display:flex;flex-direction:column;gap:0.3rem;}
  .week-btn{padding:0.5rem 0.75rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;color:var(--text-muted);text-align:left;transition:all 0.15s;display:flex;align-items:center;justify-content:space-between;}
  .week-btn:hover{border-color:var(--green);color:var(--text);}
  .week-btn.active{border-color:var(--green);background:var(--green-light);color:var(--green-mid);font-weight:600;}
  .week-done-badge{font-size:10px;background:var(--green);color:#fff;border-radius:10px;padding:1px 7px;}
  .week-partial-badge{font-size:10px;background:var(--amber-light);color:var(--amber);border-radius:10px;padding:1px 7px;}

  /* CONTENT */
  .content{min-width:0;}
  .week-header{border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1rem;border:1px solid var(--border);}
  .week-header.p1{background:linear-gradient(135deg,var(--green-light),var(--surface));border-color:#9FE1CB;}
  .week-header.p2{background:linear-gradient(135deg,var(--blue-light),var(--surface));border-color:#B5D4F4;}
  .phase-badge{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--green-mid);margin-bottom:0.2rem;}
  .week-header.p2 .phase-badge{color:var(--blue-dark);}
  .week-header h2{font-family:'DM Serif Display',serif;font-size:1.5rem;font-weight:400;margin-bottom:0.75rem;color:var(--text);}
  .week-progress{display:flex;align-items:center;gap:0.75rem;}
  .week-progress-dots{display:flex;gap:6px;}
  .dot{width:11px;height:11px;border-radius:50%;background:var(--border-mid);}
  .dot.done{background:var(--green);}
  .week-progress-text{font-size:12px;color:var(--text-muted);}

  /* DAY CARDS */
  .day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:0.75rem;overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s;}
  .day-card.completed{border-color:#5DCAA5;background:#fafffe;}
  @media(prefers-color-scheme:dark){.day-card.completed{background:#04342C;border-color:#0F6E56;}}
  .day-header{display:flex;align-items:center;gap:0.75rem;padding:1rem 1.25rem;cursor:pointer;user-select:none;}
  .day-icon{font-size:1.4rem;flex-shrink:0;}
  .day-info{flex:1;min-width:0;}
  .day-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
  .day-subtitle{margin-top:3px;}
  .day-type-pill{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;border-radius:20px;padding:2px 9px;}
  .pill-strength{background:var(--blue-light);color:var(--blue-dark);}
  .pill-yoga{background:var(--purple-light);color:var(--purple-dark);}
  .pill-mobility{background:var(--green-light);color:var(--green-mid);}
  .day-check{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border-mid);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;flex-shrink:0;transition:all 0.2s;color:transparent;}
  .day-check:hover{border-color:var(--green);}
  .day-check.checked{background:var(--green);border-color:var(--green);color:#fff;}
  .day-body{display:none;border-top:1px solid var(--border);}
  .day-body.open{display:block;}
  .day-tip{padding:0.75rem 1.25rem;background:var(--gray-light);font-size:13px;color:var(--text-muted);border-bottom:1px solid var(--border);line-height:1.5;}
  .section-title{padding:0.55rem 1.25rem;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-hint);background:var(--gray-light);border-bottom:1px solid var(--border);}

  /* EXERCISE CARDS */
  .exercise-card{border-bottom:1px solid var(--border);}
  .exercise-card:last-child{border-bottom:none;}
  .ex-header{display:flex;align-items:center;gap:0.6rem;padding:0.7rem 1.25rem;cursor:pointer;transition:background 0.15s;}
  .ex-header:hover{background:var(--gray-light);}
  .ex-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border-mid);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;cursor:pointer;transition:all 0.2s;color:transparent;}
  .ex-check:hover{border-color:var(--green);}
  .ex-check.checked{background:var(--green);border-color:var(--green);color:#fff;}
  .ex-check.pop{animation:pop 0.3s ease;}
  @keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.4);}100%{transform:scale(1);}}
  .ex-name{flex:1;font-size:13px;font-weight:500;color:var(--text);}
  .ex-detail{font-size:11px;color:var(--text-hint);font-family:'DM Mono',monospace;flex-shrink:0;}
  .ex-caution{font-size:10px;color:var(--amber);background:var(--amber-light);border-radius:4px;padding:1px 6px;flex-shrink:0;margin-left:4px;}
  .ex-expand{font-size:10px;color:var(--text-hint);margin-left:4px;flex-shrink:0;}
  .ex-body{display:none;border-top:1px solid var(--border);background:var(--gray-light);}
  .ex-body.open{display:block;}
  .ex-body-inner{display:grid;grid-template-columns:1fr 1fr;gap:1rem;padding:1rem 1.25rem;}
  @media(max-width:520px){.ex-body-inner{grid-template-columns:1fr;}}
  .ex-image-area{background:var(--surface);border-radius:var(--radius-sm);padding:1rem;text-align:center;border:1px solid var(--border);}
  .ex-image-label{font-size:12px;font-weight:500;margin-top:0.5rem;color:var(--text-muted);}
  .ex-desc h4,.form-tips h4{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-hint);margin-bottom:0.4rem;}
  .ex-desc p{font-size:13px;line-height:1.55;color:var(--text-muted);}
  .form-tips ul{list-style:none;display:flex;flex-direction:column;gap:0.4rem;}
  .form-tips li{font-size:12px;color:var(--text-muted);line-height:1.45;padding-left:1rem;position:relative;}
  .form-tips li::before{content:'→';position:absolute;left:0;color:var(--green);}
  .ankle-note{font-size:11px;color:var(--amber-dark);background:var(--amber-light);border-radius:6px;padding:6px 10px;margin-top:8px;line-height:1.4;}
  @media(prefers-color-scheme:dark){.ankle-note{color:var(--amber-light);background:rgba(186,117,23,0.2);}}

  /* WEIGHT+REPS INPUTS */
  .tracking-inputs{display:flex;align-items:center;gap:3px;margin-left:6px;flex-shrink:0;}
  .tracking-inputs input{width:42px;height:26px;border-radius:6px;border:1px solid var(--border-mid);background:var(--gray-light);font-size:12px;text-align:center;padding:0 3px;font-family:'DM Mono',monospace;color:var(--text);}
  .tracking-inputs input:focus{outline:none;border-color:var(--green);}
  .tracking-inputs .sep{font-size:10px;color:var(--text-hint);}
  .tracking-inputs input.filled{border-color:var(--green);background:var(--green-light);}
  .hist-line{padding:5px 1.25rem 0;font-size:11px;color:var(--text-hint);}
  .hist-line span{color:var(--green);font-weight:500;}

  /* COMPLETE BTN */
  .complete-day-btn{width:100%;padding:0.875rem;background:var(--green);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.2s;letter-spacing:0.01em;}
  .complete-day-btn:hover{background:var(--green-mid);}
  .complete-day-btn.done{background:var(--green-dark);}

  /* TRACKER TABLES */
  .tracker-section{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-top:1rem;}
  .tracker-header{padding:0.875rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .tracker-header-title{font-weight:600;font-size:14px;color:var(--text);}
  .tracker-header-sub{font-size:12px;color:var(--text-hint);}
  .tracker-grid{width:100%;border-collapse:collapse;}
  .tracker-grid th{font-size:10px;font-weight:600;color:var(--text-hint);text-align:center;padding:6px 4px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.06em;}
  .tracker-grid th.label-col{text-align:left;padding-left:1.25rem;}
  .tracker-grid td{text-align:center;padding:5px 3px;border-bottom:1px solid var(--border);}
  .tracker-grid td.label-col{text-align:left;padding-left:1.25rem;font-size:12px;white-space:nowrap;color:var(--text-muted);}
  .tracker-grid tr:last-child td{border-bottom:none;}
  .tracker-dot{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border-mid);background:var(--gray-light);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#fff;transition:all 0.15s;}
  .tracker-dot.done{background:var(--green);border-color:var(--green);}
  .tracker-dot.ls{border-color:var(--purple);}
  .tracker-dot.ls.done{background:var(--purple);border-color:var(--purple);}
  .tracker-count{font-size:12px;color:var(--text-hint);font-weight:600;}
  .tracker-footer{padding:8px 1.25rem;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-hint);}
  .tracker-footer strong{color:var(--green);}
  .tracker-footer .ls-strong{color:var(--purple);}

  /* STEPS INPUT */
  .steps-input{width:70px;height:22px;border-radius:5px;border:1px solid var(--border-mid);background:var(--gray-light);font-size:11px;text-align:center;font-family:'DM Mono',monospace;color:var(--text);}
  .steps-input:focus{outline:none;border-color:var(--green);}
  .steps-input.has-value{border-color:var(--green);background:var(--green-light);color:var(--green-mid);}

  /* BIKE INPUT */
  .bike-input{width:44px;height:22px;border-radius:5px;border:1px solid var(--border-mid);background:var(--gray-light);font-size:11px;text-align:center;font-family:'DM Mono',monospace;color:var(--text);}
  .bike-input:focus{outline:none;border-color:var(--green);}
  .bike-input.has-value{border-color:var(--green);background:var(--green-light);color:var(--green-mid);}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">🏃</div>
    <div class="auth-title"><span class="auth-name">Michael's</span> Workout</div>
    <div class="auth-sub">Your personal 8-week circuit training program — fat loss, strength, mobility &amp; yoga. Built around your schedule and your body.</div>
    <div class="auth-phases">
      <div class="auth-phase p1">Phase 1 · Foundation</div>
      <div class="auth-phase p2">Phase 2 · Build</div>
    </div>
    <button class="sign-in-btn" onclick="handleSignIn()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#fff" d="M9 3.48c1.69 0 2.83.73 3.48 1.34l2.54-2.48C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l2.91 2.26C4.6 5.05 6.62 3.48 9 3.48z"/><path fill="#fff" d="M17.64 9.2c0-.74-.06-1.28-.19-1.84H9v3.34h4.96c-.1.83-.64 2.08-1.84 2.92l2.84 2.2c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#fff" d="M3.88 10.78A5.54 5.54 0 0 1 3.58 9c0-.62.11-1.22.29-1.78L.96 4.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.04l2.92-2.26z"/><path fill="#fff" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.84-2.2c-.76.53-1.78.9-3.12.9-2.38 0-4.4-1.57-5.12-3.74L.87 13.04C2.35 15.98 5.48 18 9 18z"/></svg>
      Sign in with Google
    </button>
  </div>
</div>

<div id="loading-overlay">
  <div class="loading-card">
    <div class="spinner"></div>
    <div id="loading-msg">Loading your progress...</div>
  </div>
</div>

<div id="sync-bar"></div>

<div id="app">
  <div class="app-header">
    <div class="header-inner">
      <div class="header-logo">Michael's <span>Workout</span></div>
      <div class="header-stats">
        <div class="stat-pill">Days: <strong id="stat-days">0</strong>/32</div>
        <div class="stat-pill">Progress: <strong id="stat-pct">0%</strong></div>
        <div class="user-avatar" id="user-initials" onclick="handleSignOut()" title="Sign out">M</div>
      </div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <div class="phase-tabs">
        <button class="phase-btn p1 active" onclick="selectPhase(1)">Phase 1<small>Foundation · Wk 1–4</small></button>
        <button class="phase-btn p2" onclick="selectPhase(2)">Phase 2<small>Build · Wk 5–8</small></button>
      </div>
      <div class="sidebar-title">Week</div>
      <div id="week-list"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
const API_KEY = 'AIzaSyAiEZgkpZUbNkyxCIU1TvR3ApFdGwAo2gE';
const CLIENT_ID = '44246799047-kj76pa9cn9fhmarb2soa65elg0hfg2np.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile';
const FILE_NAME = 'michaels-workout-data.json';
let gapiInited=false,gisInited=false,tokenClient,driveFileId,saveTimer;
let state={};

// ── GOOGLE AUTH ───────────────────────────────────────────────
window.gapiLoaded=function(){gapi.load('client',async()=>{await gapi.client.init({apiKey:API_KEY,discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});gapiInited=true;maybeEnableApp();});};
window.gisLoaded=function(){tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:async(resp)=>{if(resp.error){showSync('Sign-in failed: '+resp.error,'error');return;}await afterSignIn();}});gisInited=true;maybeEnableApp();};
function maybeEnableApp(){if(gapiInited&&gisInited){const tok=sessionStorage.getItem('gapi_token');if(tok){gapi.client.setToken(JSON.parse(tok));afterSignIn();}}}
function handleSignIn(){if(!gapiInited||!gisInited){alert('Google APIs still loading. Please wait.');return;}if(gapi.client.getToken()===null)tokenClient.requestAccessToken({prompt:'consent'});else tokenClient.requestAccessToken({prompt:''});}
function handleSignOut(){const token=gapi.client.getToken();if(token){google.accounts.oauth2.revoke(token.access_token);gapi.client.setToken('');}sessionStorage.removeItem('gapi_token');document.getElementById('app').style.display='none';document.getElementById('auth-screen').style.display='flex';}
async function afterSignIn(){
  sessionStorage.setItem('gapi_token',JSON.stringify(gapi.client.getToken()));
  document.getElementById('auth-screen').style.display='none';
  showLoading('Loading your progress from Google Drive...');
  try{
    const ui=await gapi.client.request({path:'https://www.googleapis.com/oauth2/v3/userinfo'});
    const name=ui.result.name||'Michael';
    const initials=name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    document.getElementById('user-initials').textContent=initials;
  }catch(e){document.getElementById('user-initials').textContent='M';}
  await loadFromDrive();
  hideLoading();
  document.getElementById('app').style.display='block';
  renderAll();
}

// ── DRIVE ─────────────────────────────────────────────────────
async function findOrCreateFile(){const res=await gapi.client.drive.files.list({q:`name='${FILE_NAME}' and trashed=false`,spaces:'drive',fields:'files(id,name)'});if(res.result.files&&res.result.files.length>0)return res.result.files[0].id;const boundary='-------314159265358979323846';const meta=JSON.stringify({name:FILE_NAME,mimeType:'application/json'});const body=`--${boundary}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n{}\r\n--${boundary}--`;const r=await gapi.client.request({path:'/upload/drive/v3/files',method:'POST',params:{uploadType:'multipart'},headers:{'Content-Type':`multipart/related; boundary="${boundary}"`},body});return r.result.id;}
async function loadFromDrive(){try{driveFileId=await findOrCreateFile();const res=await gapi.client.drive.files.get({fileId:driveFileId,alt:'media'});state=(typeof res.result==='object'&&res.result!==null)?res.result:{};}catch(e){state={};showSync('Could not load from Drive. Working offline.','error');}}
async function saveToDrive(){if(!driveFileId)return;showSync('Saving...','saving');try{await gapi.client.request({path:`/upload/drive/v3/files/${driveFileId}`,method:'PATCH',params:{uploadType:'media'},headers:{'Content-Type':'application/json'},body:JSON.stringify(state)});showSync('✓ Saved to Google Drive','');setTimeout(()=>hideSyncBar(),2500);}catch(e){showSync('Save failed — check your connection','error');}}
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveToDrive,1200);}

// ── STATE HELPERS ─────────────────────────────────────────────
const DAYS=['Tue','Thu','Sat','Sun'];
const DAY_PHASES={1:[1,2,3,4],2:[5,6,7,8]};
let currentPhase=1,currentWeek=1;

function dayKey(w,d){return `w${w}_${d}`;}
function exKey(w,d,s,e){return `ex_w${w}_${d}_s${s}_e${e}`;}
function wtKey(ek){return `wt_${ek}`;}
function rpKey(ek){return `rp_${ek}`;}
function totalDaysDone(){return Object.keys(state).filter(k=>/^w\d+_[A-Z]/.test(k)&&state[k]).length;}
function weekProgress(w){return{done:DAYS.filter(d=>state[dayKey(w,d)]).length,total:4};}
function pillClass(t){return{strength:'pill-strength',yoga:'pill-yoga',mobility:'pill-mobility'}[t]||'pill-strength';}

// ── RENDER ────────────────────────────────────────────────────
function updateHeader(){
  const done=totalDaysDone(),pct=Math.round((done/32)*100);
  document.getElementById('stat-days').textContent=done;
  document.getElementById('stat-pct').textContent=pct+'%';
  document.getElementById('progress-fill').style.width=pct+'%';
}

function renderWeekList(){
  const weeks=DAY_PHASES[currentPhase];
  let html='<div class="sidebar-title">Week</div>';
  weeks.forEach(w=>{
    const prog=weekProgress(w);
    let badge='';
    if(prog.done===DAYS.length)badge=`<span class="week-done-badge">✓</span>`;
    else if(prog.done>0)badge=`<span class="week-partial-badge">${prog.done}/${DAYS.length}</span>`;
    html+=`<button class="week-btn ${w===currentWeek?'active':''}" onclick="selectWeek(${w})">Week ${w} ${badge}</button>`;
  });
  document.getElementById('week-list').innerHTML=html;
}

function renderContent(){
  const phase=currentPhase,week=currentWeek;
  const prog=weekProgress(week);
  const dots=DAYS.map(d=>`<div class="dot ${state[dayKey(week,d)]?'done':''}"></div>`).join('');
  let html=`<div class="week-header p${phase}">
    <div class="phase-badge">Phase ${phase} — ${phase===1?'Foundation':'Build'}</div>
    <h2>Week ${week}</h2>
    <div class="week-progress"><div class="week-progress-dots">${dots}</div><span class="week-progress-text">${prog.done} of ${prog.total} days complete</span></div>
  </div>`;

  const NO_TRACK=['seated-march','ankle-circles','ankle-alphabet','arm-circles','shoulder-rolls','cat-cow','thread-needle','childs-pose','hip-circles','leg-swings','band-pull-aparts','bw-squats','chest-opener','figure-four','breathwork','bird-dog','glute-bridge','band-bridge','clamshells','plank','dead-bug','glute-march','hamstring-stretch','hip-flexor-stretch','lower-body-stretch','upper-body-stretch','full-stretch','pigeon-pose','90-90-stretch','wall-sit','yoga-flexibility','yoga-mobility','yoga-strength','yoga-balance','yoga-yin','yoga-hip','yoga-core','yoga-full-body','band-rows','band-bicep-curls','band-face-pulls','seated-leg-press-band'];

  DAYS.forEach(day=>{
    const wk=makeWorkout(phase,week,day);
    const dk=dayKey(week,day);
    const isDone=!!state[dk];
    html+=`<div class="day-card ${isDone?'completed':''}" id="card_${day}">
      <div class="day-header" onclick="toggleDay('${day}')">
        <div class="day-icon">${wk.icon}</div>
        <div class="day-info"><div class="day-name">${wk.title}</div><div class="day-subtitle"><span class="day-type-pill ${pillClass(wk.type)}">${wk.type}</span></div></div>
        <div class="day-check ${isDone?'checked':''}" onclick="toggleDayDone(event,'${day}')">${isDone?'✓':''}</div>
      </div>
      <div class="day-body" id="body_${day}">
        <div class="day-tip">💡 ${wk.tip}</div>`;

    wk.sections.forEach((sec,sIdx)=>{
      html+=`<div class="section-title">${sec.title}</div>`;
      sec.exercises.forEach((ex,eIdx)=>{
        const info=EXERCISES[ex.key]||{icon:'●',name:ex.key,desc:'',tips:[],ankleNote:false};
        const ek=exKey(week,day,sIdx,eIdx);
        const exDone=!!state[ek];
        const showTrack=wk.type!=='yoga'&&!NO_TRACK.includes(ex.key);
        const curWt=state[wtKey(ek)]||'';
        const curRp=state[rpKey(ek)]||'';
        const hist=getHistory(week,day,sIdx,eIdx);

        html+=`<div class="exercise-card" id="excard_${ek}">
          <div class="ex-header" onclick="toggleEx('${ek}')">
            <div class="ex-check ${exDone?'checked':''}" onclick="toggleExDone(event,'${ek}')">${exDone?'✓':''}</div>
            <span class="ex-name">${info.name}</span>
            ${info.ankleNote?'<span class="ex-caution">⚠ ankle/knee</span>':''}
            <span class="ex-detail">${ex.detail}</span>
            ${showTrack?`<div class="tracking-inputs" onclick="event.stopPropagation()">
              <input type="number" value="${curWt}" placeholder="lbs" title="Weight (lbs)" onchange="saveWt('${ek}',this.value)" class="${curWt?'filled':''}"/>
              <span class="sep">×</span>
              <input type="number" value="${curRp}" placeholder="reps" title="Reps done" onchange="saveRp('${ek}',this.value)" class="${curRp?'filled':''}"/>
            </div>`:''}
            <span class="ex-expand" id="exarrow_${ek}">▼</span>
          </div>
          <div class="ex-body" id="exbody_${ek}">
            ${hist.length>0?`<div class="hist-line">Previous: ${hist.map(h=>`<span>${h}</span>`).join(' · ')}</div>`:''}
            <div class="ex-body-inner">
              <div>
                <div class="ex-image-area"><div style="font-size:3rem">${info.icon}</div><div class="ex-image-label">${info.name}</div></div>
                <div class="ex-desc" style="margin-top:0.75rem"><h4>How to do it</h4><p>${info.desc}</p>${ex.detail?`<p style="font-size:12px;color:var(--text-hint);margin-top:0.4rem">📋 ${ex.detail}</p>`:''}</div>
                ${info.ankleNote?`<div class="ankle-note">⚠️ Right ankle/knee: use the modification mentioned above if uncomfortable. Never push through sharp pain.</div>`:''}
              </div>
              <div class="form-tips"><h4>Form cues</h4><ul>${info.tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>
            </div>
          </div>
        </div>`;
      });
    });

    html+=`<button class="complete-day-btn ${isDone?'done':''}" onclick="markDayComplete('${day}')">
      ${isDone?'✓ Day Complete!':'+ Mark Entire Day Complete'}
    </button></div></div>`;
  });

  html+=buildActivityTracker(week);
  html+=buildLifestyleTracker(week);
  document.getElementById('content').innerHTML=html;
}

function renderAll(){renderWeekList();renderContent();updateHeader();}

// ── HISTORY ───────────────────────────────────────────────────
function getHistory(week,day,sIdx,eIdx){
  const res=[];
  for(let w=1;w<week;w++){
    const ek=exKey(w,day,sIdx,eIdx);
    const wt=state[wtKey(ek)],rp=state[rpKey(ek)];
    if(wt||rp){let e=`wk${w}`;if(wt)e+=` ${wt}lbs`;if(rp)e+=` ×${rp}`;res.push(e);}
  }
  return res.slice(-3);
}

// ── ACTIVITY TRACKER ──────────────────────────────────────────
const ACTIVITIES=[
  {key:'walk',label:'🚶 Outdoor walk 30+ min',type:'dot'},
  {key:'steps',label:'👣 Daily steps',type:'steps'},
  {key:'bike',label:'🚴 Road bike ride',type:'bike'},
  {key:'soccer',label:'⚽ Soccer',type:'dot'},
  {key:'swim',label:'🏊 Swimming',type:'dot'},
  {key:'yoga',label:'🧘 Yoga',type:'dot'},
];
const WDAYS=['M','T','W','T','F','S','S'];

function actKey(w,act,d){return `act_w${w}_${act}_d${d}`;}
function bikeKey(w,d){return `bike_w${w}_d${d}`;}
function stepsKey(w,d){return `steps_w${w}_d${d}`;}

function buildActivityTracker(week){
  let total=0;
  let bikeTotal=0;
  let html=`<div class="tracker-section"><div class="tracker-header"><div class="tracker-header-title">Extra Activity — Week ${week}</div><div class="tracker-header-sub">Tap any day to log it</div></div>
  <table class="tracker-grid"><thead><tr><th class="label-col">Activity</th>${WDAYS.map(d=>`<th>${d}</th>`).join('')}<th>Total</th></tr></thead><tbody>`;

  ACTIVITIES.forEach(act=>{
    let rowCount=0;
    html+=`<tr><td class="label-col">${act.label}</td>`;
    for(let d=0;d<7;d++){
      if(act.type==='bike'){
        const bk=bikeKey(week,d);
        const mins=state[bk]||'';
        if(mins&&parseInt(mins)>0){rowCount+=parseInt(mins);total++;}
        html+=`<td><input type="number" class="bike-input${mins?' has-value':''}" value="${mins}" placeholder="—" title="Minutes biked" onchange="saveBike(${week},${d},this.value)" onclick="event.stopPropagation()" /></td>`;
      } else if(act.type==='steps'){
        const sk=stepsKey(week,d);
        const steps=state[sk]||'';
        if(steps&&parseInt(steps)>0)total++;
        html+=`<td><input type="number" class="steps-input${steps?' has-value':''}" value="${steps}" placeholder="—" title="Steps today" onchange="saveSteps(${week},${d},this.value)" onclick="event.stopPropagation()" /></td>`;
      } else {
        const k=actKey(week,act.key,d);
        const done=!!state[k];
        if(done){rowCount++;total++;}
        html+=`<td><div class="tracker-dot${done?' done':''}" onclick="toggleActivity(${week},'${act.key}',${d})">${done?'✓':''}</div></td>`;
      }
    }
    // Show appropriate total
    let countDisplay=rowCount;
    if(act.type==='bike'){countDisplay=rowCount?rowCount+'m':'0';bikeTotal=rowCount;}
    else if(act.type==='steps'){countDisplay='—';}
    html+=`<td class="tracker-count">${countDisplay}</td></tr>`;
  });

  html+=`</tbody></table><div class="tracker-footer"><span>Total logged: <strong>${total}</strong>${bikeTotal?` · <strong>${bikeTotal} min</strong> biking`:''}</span><span>Week ${week} of 8</span></div></div>`;
  return html;
}

function toggleActivity(w,act,d){const k=actKey(w,act,d);state[k]=!state[k];scheduleSave();renderContent();updateHeader();}
function saveBike(w,d,val){state[bikeKey(w,d)]=val;state[actKey(w,'bike',d)]=val&&parseInt(val)>0;scheduleSave();}
function saveSteps(w,d,val){state[stepsKey(w,d)]=val;scheduleSave();}

// ── LIFESTYLE TRACKER ─────────────────────────────────────────
const LIFESTYLE=[
  {key:'sleep',label:'😴 Sleep 6+ hours'},
  {key:'water',label:'💧 4+ glasses of water'},
  {key:'anxiety-meds',label:'💊 Anxiety medication taken'},
  {key:'allergy-meds',label:'🤧 Allergy medication taken'},
];

function lsKey(w,item,d){return `ls_w${w}_${item}_d${d}`;}

function buildLifestyleTracker(week){
  let total=0;
  let html=`<div class="tracker-section" style="margin-bottom:1.5rem"><div class="tracker-header"><div class="tracker-header-title">Daily Lifestyle — Week ${week}</div><div class="tracker-header-sub">Track your daily habits</div></div>
  <table class="tracker-grid"><thead><tr><th class="label-col">Habit</th>${WDAYS.map(d=>`<th>${d}</th>`).join('')}<th>#</th></tr></thead><tbody>`;

  LIFESTYLE.forEach(item=>{
    let rowCount=0;
    html+=`<tr><td class="label-col">${item.label}</td>`;
    for(let d=0;d<7;d++){
      const k=lsKey(week,item.key,d);
      const done=!!state[k];
      if(done){rowCount++;total++;}
      html+=`<td><div class="tracker-dot ls${done?' done':''}" onclick="toggleLifestyle(${week},'${item.key}',${d})">${done?'✓':''}</div></td>`;
    }
    html+=`<td class="tracker-count">${rowCount}</td></tr>`;
  });

  html+=`</tbody></table><div class="tracker-footer"><span>Total: <span class="ls-strong"><strong>${total}</strong></span></span><span>Keep the streak going 💜</span></div></div>`;
  return html;
}

function toggleLifestyle(w,item,d){const k=lsKey(w,item,d);state[k]=!state[k];scheduleSave();renderContent();}

// ── INTERACTIONS ──────────────────────────────────────────────
function toggleDay(d){const b=document.getElementById('body_'+d);if(b)b.classList.toggle('open');}
function toggleDayDone(e,day){e.stopPropagation();const dk=dayKey(currentWeek,day);state[dk]=!state[dk];scheduleSave();renderAll();}
function markDayComplete(day){state[dayKey(currentWeek,day)]=true;scheduleSave();renderAll();}
function toggleEx(ek){const body=document.getElementById('exbody_'+ek);const arrow=document.getElementById('exarrow_'+ek);if(body){body.classList.toggle('open');if(arrow)arrow.textContent=body.classList.contains('open')?'▲':'▼';}}
function toggleExDone(e,ek){
  e.stopPropagation();state[ek]=!state[ek];scheduleSave();
  const check=document.getElementById('excard_'+ek)?.querySelector('.ex-check');
  if(check){check.classList.toggle('checked',!!state[ek]);check.textContent=state[ek]?'✓':'';check.classList.add('pop');setTimeout(()=>check.classList.remove('pop'),300);}
  updateHeader();
}
function saveWt(ek,val){state[wtKey(ek)]=val;scheduleSave();}
function saveRp(ek,val){state[rpKey(ek)]=val;scheduleSave();}
function selectPhase(p){currentPhase=p;currentWeek=DAY_PHASES[p][0];document.querySelectorAll('.phase-btn').forEach((b,i)=>b.classList.toggle('active',i+1===p));renderAll();}
function selectWeek(w){currentWeek=w;renderAll();window.scrollTo({top:0,behavior:'smooth'});}
